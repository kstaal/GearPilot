name: Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Lua Code

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t gearpilot-tests .

      - name: Run luacheck
        run: docker run gearpilot-tests luacheck GearPilot/ --globals _G

  test:
    runs-on: ubuntu-latest
    name: Run Unit Tests
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t gearpilot-tests .

      - name: Run tests
        run: docker run gearpilot-tests busted specs/ --verbose

  validate-toc:
    runs-on: ubuntu-latest
    name: Validate TOC File

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check TOC file exists
        run: |
          if [ ! -f "GearPilot/GearPilot.toc" ]; then
            echo "TOC file not found!"
            exit 1
          fi

      - name: Validate TOC format
        run: |
          if ! grep -q "^## Interface:" GearPilot/GearPilot.toc; then
            echo "Missing Interface line in TOC"
            exit 1
          fi
          if ! grep -q "^## Title:" GearPilot/GearPilot.toc; then
            echo "Missing Title line in TOC"
            exit 1
          fi
          if ! grep -q "^## Version:" GearPilot/GearPilot.toc; then
            echo "Missing Version line in TOC"
            exit 1
          fi

      - name: Check for lua files
        run: |
          if ! grep -q "\.lua$" GearPilot/GearPilot.toc; then
            echo "No Lua files listed in TOC"
            exit 1
          fi

  changelog:
    runs-on: ubuntu-latest
    name: Validate CHANGELOG

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check CHANGELOG format
        run: |
          if ! grep -q "^## \[" CHANGELOG.md; then
            echo "CHANGELOG missing version entries (format: ## [X.Y.Z])"
            exit 1
          fi

  package:
    runs-on: ubuntu-latest
    name: Package GearPilot
    needs: [lint, test, validate-toc, changelog]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Package GearPilot folder
        run: zip -r GearPilot.zip GearPilot/

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: GearPilot-package
          path: GearPilot.zip
