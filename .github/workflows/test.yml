name: Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Lua Code

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v9
        with:
          luaVersion: "5.1"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Run luacheck
        run: luacheck GearPilot/ --globals _G

  test:
    runs-on: ubuntu-latest
    name: Run Unit Tests
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v9
        with:
          luaVersion: "5.1"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install busted
        run: luarocks install busted

      - name: Run tests
        run: busted specs/ --verbose

  validate-toc:
    runs-on: ubuntu-latest
    name: Validate TOC File

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check TOC file exists
        run: |
          if [ ! -f "GearPilot/GearPilot.toc" ]; then
            echo "TOC file not found!"
            exit 1
          fi

      - name: Validate TOC format
        run: |
          if ! grep -q "^## Interface:" GearPilot/GearPilot.toc; then
            echo "Missing Interface line in TOC"
            exit 1
          fi
          if ! grep -q "^## Title:" GearPilot/GearPilot.toc; then
            echo "Missing Title line in TOC"
            exit 1
          fi
          if ! grep -q "^## Version:" GearPilot/GearPilot.toc; then
            echo "Missing Version line in TOC"
            exit 1
          fi

      - name: Check for lua files
        run: |
          if ! grep -q "\.lua$" GearPilot/GearPilot.toc; then
            echo "No Lua files listed in TOC"
            exit 1
          fi

  changelog:
    runs-on: ubuntu-latest
    name: Validate CHANGELOG

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check CHANGELOG format
        run: |
          if ! grep -q "^## \[" CHANGELOG.md; then
            echo "CHANGELOG missing version entries (format: ## [X.Y.Z])"
            exit 1
          fi
